<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiLockerQA</title>
    <style>
        
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f4f6f8;
    }

    h2 {
        color: #fff;
        font-size: 1.5rem;
        background: none;
        padding: 0;
    }

    #header{
        display: flex;
        align-items: center;
        justify-content: center;
        background: #357ab8;
        padding: 12px;
        position: relative;

    }

    #Output {
        flex: 1;
        padding: 12px;
        background: #ffffff;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    #logout-button{
        position: absolute;
        right: 12px;
        margin: 0;
        padding: 8px 14px;
        font-size: 15px;
    }

    #Output div {
        margin-bottom: 12px;
        padding: 10px;
        background: #eef3f7;
        border-radius: 6px;
    }

    #Output p {
        margin: 4px 0;
        font-size: 1rem;
        color: #0d0d0d;

    }
    #inputfield {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
    }

    #inputcontainer {
        display: flex;
        padding: 10px;
        background: #f4f6f8;
        border-bottom: 20px solid #357ab8;
    
    }
    
    button {
        margin-left: 10px;
        padding: 10px 16px;
        background: #357ab8;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 20px;
    }

    button:hover {
        background: #285a85;
    }


    </style>

</head>
<body>
    <div id = "header">
        <h2>DigiLockerQA</h2>
        <button id="logout-button" onclick="Logout()">Logout</button>
    </div>

    <div id ="inputcontainer">
        <input type="text" id="inputfield" placeholder="Enter Your Text...">
        <button onclick="sendrequest()">Submit</button>
    </div>
    <br>
    <div id="Output"></div>


    <script>
        let session_id = sessionStorage.getItem("session_id");
        if(!session_id){
            alert("Please login first");
            window.location.href= "/";
        }

        function sendrequest(){
            var input = document.getElementById("inputfield");
            var question = input.value.trim();
            var output = document.getElementById("Output");

            var container = document.createElement("div");
            var q = document.createElement("p");
            q.innerHTML = "Question: " + question;
            
            var a = document.createElement("p");
            a.innerHTML = "Answer: " ;

            container.appendChild(q);
            container.appendChild(a);
            output.insertBefore(container, output.firstChild);

          

            
            var ajax = new XMLHttpRequest();
            ajax.open("GET", `http://187.127.132.79:80/ask?query=${encodeURIComponent(question)}`);
            ajax.setRequestHeader("session_id",sessionStorage.getItem("session_id"));
            ajax.onreadystatechange = function(){
                if(ajax.status ==200){
                    var data = JSON.parse(ajax.responseText);
                    var answer = data.results?.[0]?.answer || "No answer found.";
                    a.innerHTML = answer;
                } else {
                    a.innerHTML = "Error fetching response.";
                }

            };
            ajax.send();


            input.value = "";
            input.focus();


        }


        function Logout(){
            var ajax = new XMLHttpRequest();
            ajax.open("GET","http://187.127.132.79:80/logout",true);
            ajax.setRequestHeader("session_id",sessionStorage.getItem("session_id"));
            ajax.onreadystatechange = function(){
                if (ajax.status==200){
                    var data = JSON.parse(ajax.responseText);
                    if (data.message === "Logout Successfully"){
                        sessionStorage.removeItem("session_id")
                        window.location.href = "/";

                    }else{
                        alert("Logout Failed")
                    }
                }else{
                    alert("Server error")
                }
            
            };
            ajax.send();
        }
        

    </script>
    
</body>
</html>
